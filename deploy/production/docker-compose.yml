# 生产环境 Docker Compose 配置
# 使用方式: VERSION=v1.0.5 docker compose up -d

services:
  nginx:
    image: nginx:alpine
    container_name: softwarebomadmin-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - softwarebomadmin-network
      - supabase-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: ghcr.io/${GITHUB_REPO:-your-org/softwarebomadmin}:${VERSION:-latest}
    container_name: softwarebomadmin-web
    restart: unless-stopped
    volumes:
      - ./app-config.js:/usr/share/nginx/html/app-config.js:ro
    networks:
      - softwarebomadmin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # BOM 本地目录扫描：消费 bom_scan_jobs，写入 local_file（需 service_role + 挂载暂存目录）
  bom-scanner:
    image: ghcr.io/${GITHUB_REPO:-your-org/softwarebomadmin}-bom-scanner:${VERSION:-latest}
    container_name: softwarebomadmin-bom-scanner
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL_FOR_WORKER:-http://kong:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      BOM_LOCAL_ROOT: ${BOM_LOCAL_ROOT:-/data/bom_store}
    volumes:
      # 阶段 4 需写入 it-Artifactory 拉取的文件；须与 BOM_LOCAL_ROOT 一致
      - ${BOM_HOST_STORE:-./data/bom_store}:/data/bom_store
    networks:
      - softwarebomadmin-network
      - supabase-network

networks:
  softwarebomadmin-network:
    driver: bridge
  supabase-network:
    external: true
    name: supabase_default
